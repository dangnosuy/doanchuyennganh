version: '3'
services:
  dvwa:
    image: vulnerables/web-dvwa
    container_name: benchmark_dvwa
    ports:
      - "8081:80"
    restart: always

  juiceshop:
    image: bkimminich/juice-shop
    container_name: benchmark_juiceshop
    ports:
      - "3000:3000"
    restart: always

  webgoat:
    image: webgoat/webgoat
    container_name: benchmark_webgoat
    environment:
      - WEBWOLF_HOST=localhost
      - WEBWOLF_PORT=9090
    ports:
      - "8082:8080"
      - "9090:9090"
    restart: always
